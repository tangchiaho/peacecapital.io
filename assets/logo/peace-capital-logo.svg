<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180">

<style>
.symbol{
fill:#2F3342;
}
.wordmark{
font-family: Georgia, "Times New Roman", serif;
font-size:48px;
letter-spacing:4px;
fill:#2F3342;
}
</style>

<!-- Symbol -->
<g class="symbol" transform="translate(20,40)">

<!-- left block -->
<path d="M0 0
A50 50 0 0 1 50 50
L50 100
L0 100
Z"/>

<!-- arch -->
<path d="M65 100
A35 35 0 0 1 100 65
L100 100
Z"/>

<!-- base -->
<rect x="0" y="100" width="25" height="12"/>

</g>

<!-- Wordmark -->
<text x="150" y="110" class="wordmark">
PEACE CAPITAL
</text>

</svg>